apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lakshman-dev-edit-binding
  namespace: dev
subjects:
  - kind: User
    name: lakshman    # must exactly match username in aws-auth
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: edit
  apiGroup: rbac.authorization.k8s.io