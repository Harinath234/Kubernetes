  apiVersion: v1
  kind: Pod
  metadata:
    name: pod-with-node-affinity
  spec:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: env
              operator: In
              values:
              - prod

            - key: topology.kubernetes.io/zone
              operator: NotIn
              values: [ us-east-1a ]

            
    containers:
    - name: nginx
      image: nginx