---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: env-var-pod
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: myapp:1.0
        env:
          - name: SERVICE_NAME
            value: "user-service"
        envFrom:
          - configMapRef:
              name: app-config
          - secretRef:
              name: db-secret
